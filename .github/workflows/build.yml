name: Build RapidTunVPN

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x ./V2rayNG/gradlew

      - name: Build Debug APK
        run: cd V2rayNG && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RapidTunVPN-Debug-APK
          path: V2rayNG/app/build/outputs/apk/debug/app-debug.apk
